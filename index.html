<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Passport Photo Printer</title>
  <link rel="stylesheet" href="style.css">

  <!-- face-api -->
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>
</head>
<body>

<div class="container">

  <!-- Upload -->
  <div id="uploadBox" class="upload-box">
    <p>Drag & Drop or Upload</p>
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <!-- Copy Selector -->
  <div class="copies">
    <button onclick="setCopies(3)">3</button>
    <button onclick="setCopies(6)">6</button>
    <button onclick="setCopies(9)">9</button>
    <button onclick="setCopies(12)">12</button>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button onclick="processImage()">Process</button>
    <button onclick="window.print()">Print</button>
  </div>

  <!-- A4 -->
  <div class="a4">
    <div id="photoGrid" class="photo-grid"></div>
  </div>

</div>

<script src="config.js"></script>
<script src="script.js"></script>

</body>
</html>
